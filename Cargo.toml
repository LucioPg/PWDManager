[package]
name = "PWDManager"
version = "0.1.0"
edition = "2024"

[dependencies]
image = { version = "0.25.9", features = ["png"] }
gui-launcher = {path = "gui_launcher" }
custom_errors = {path = "custom_errors"}
tracing = "0.1.44"
dioxus = { version = "0.7.3", features = ["desktop", "router"] }
sqlx = { version = "0.8.6", features = ["runtime-tokio", "sqlite", "macros"] }
tokio = { version = "1.49.0", features = ["full"] }
argon2 = { version = "0.5.3", features = ["std"] }
base64 = "0.22.1"
rfd = "0.17.2"

[target.'cfg(windows)'.build-dependencies]
winres = "0.1"


#[lib]
#name = "guilauncher"
#path = "gui_launcher/src/lib.rs"
[workspace]
members = ["gui_launcher", ".", "custom_errors"]

[features]
default = ["desktop"]
desktop = ["dioxus/desktop"]
